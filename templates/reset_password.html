{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <h1 class="mb-4">Recuperar contrasena</h1>

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input name="email" type="email" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100">Enviar enlace</button>
        </form>

        <p class="mt-3">
            <a href="{{ url_for('auth.login') }}">Volver al login</a>
        </p>
    </div>
</div>

{% endblock %}

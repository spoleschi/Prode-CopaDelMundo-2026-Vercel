{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">Crear nueva contrasena</h1>

        <div id="resetStatus" class="alert alert-info">
            Validando enlace de recuperacion...
        </div>

        <form id="resetPasswordForm" class="d-none">
            <div class="mb-3">
                <label class="form-label">Nueva contrasena</label>
                <input
                    id="password"
                    type="password"
                    class="form-control"
                    minlength="6"
                    autocomplete="new-password"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Repetir contrasena</label>
                <input
                    id="passwordConfirm"
                    type="password"
                    class="form-control"
                    minlength="6"
                    autocomplete="new-password"
                    required
                >
            </div>

            <button id="submitButton" class="btn btn-primary w-100" type="submit">
                Guardar nueva contrasena
            </button>
        </form>

        <div class="mt-3">
            <a href="{{ url_for('auth.reset_password_request') }}">Solicitar otro enlace</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseUrl = {{ supabase_url|tojson }};
    const supabaseAnonKey = {{ supabase_anon_key|tojson }};
    const loginUrl = {{ url_for('auth.login')|tojson }};
    const resetRequestUrl = {{ url_for('auth.reset_password_request')|tojson }};

    const statusBox = document.getElementById("resetStatus");
    const form = document.getElementById("resetPasswordForm");
    const submitButton = document.getElementById("submitButton");
    const passwordInput = document.getElementById("password");
    const passwordConfirmInput = document.getElementById("passwordConfirm");

    function setStatus(message, category) {
        statusBox.className = `alert alert-${category}`;
        statusBox.textContent = message;
    }

    function disableForm(disabled) {
        submitButton.disabled = disabled;
        passwordInput.disabled = disabled;
        passwordConfirmInput.disabled = disabled;
    }

    async function initResetFlow() {
        if (!supabaseUrl || !supabaseAnonKey) {
            setStatus("Falta configurar Supabase para completar el reseteo.", "danger");
            return;
        }

        const client = window.supabase.createClient(supabaseUrl, supabaseAnonKey, {
            auth: {
                detectSessionInUrl: true,
                persistSession: false,
                autoRefreshToken: false
            }
        });

        const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
        const type = hash.get("type");
        const hasRecoveryTokens = hash.has("access_token") && hash.has("refresh_token");

        if (type !== "recovery" || !hasRecoveryTokens) {
            setStatus("El enlace no es valido o ya fue utilizado. Solicita un nuevo enlace de recuperacion.", "danger");
            return;
        }

        await new Promise(resolve => setTimeout(resolve, 300));

        const { data, error } = await client.auth.getSession();

        if (error || !data.session) {
            setStatus("No se pudo validar el enlace. Solicita un nuevo enlace de recuperacion.", "danger");
            return;
        }

        setStatus("Enlace validado. Ingresa tu nueva contrasena.", "success");
        form.classList.remove("d-none");

        form.addEventListener("submit", async event => {
            event.preventDefault();

            const password = passwordInput.value;
            const passwordConfirm = passwordConfirmInput.value;

            if (password.length < 6) {
                setStatus("La contrasena debe tener al menos 6 caracteres.", "warning");
                return;
            }

            if (password !== passwordConfirm) {
                setStatus("Las contrasenas no coinciden.", "warning");
                return;
            }

            disableForm(true);
            setStatus("Guardando nueva contrasena...", "info");

            const { error: updateError } = await client.auth.updateUser({ password });

            if (updateError) {
                disableForm(false);
                setStatus("No se pudo actualizar la contrasena. Solicita un nuevo enlace e intenta otra vez.", "danger");
                return;
            }

            await client.auth.signOut();
            setStatus("Contrasena actualizada correctamente. Redirigiendo al login...", "success");
            window.location.replace(`${loginUrl}?password_reset=1`);
        });
    }

    initResetFlow();
</script>

{% endblock %}
